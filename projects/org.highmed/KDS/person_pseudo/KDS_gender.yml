grammar: FHIRConnect/v1.0.0
type: extension
metadata:
  name: KDS_gender.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  extends: EVALUATION.gender.v1

mappings:
  - name: "other-amtlich"
    extension: "add"
    with:
      fhir: "$resource.gender.extension"
      openehr: "$archetype/data[at0002]/items[at0014]"
    followedBy:
      mappings:
        - name: "staticExtensionUrl"
          with:
            fhir: "$fhirRoot"
          manual:
            - name: "staticUrl"
              fhir:
                - path: "url"
                  value: "http://fhir.de/StructureDefinition/gender-amtlich-de"

        - name: "otherAmtlichValueCoding"
          with:
            fhir: "$fhirRoot.value"
            openehr: "$openehrRoot/defining_code"
            type: "CODING"
