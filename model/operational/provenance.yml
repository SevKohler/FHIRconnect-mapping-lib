grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: provenance
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Provenance


## WIP CHECK THEOS MODEL

# OPERATIONAL MODEL — No openEhrConfig: this resource is not derived from a
# single openEHR archetype but is generated by the FHIRconnect engine as a
# side-effect of every composition-to-FHIR mapping run.
#
# Provenance fields fall into three buckets:
#
#   1. RUNTIME-SUPPLIED (cannot be expressed in YAML — engine fills in at run time)
#        - target[]                         the resources just produced
#        - recorded / occurredDateTime      now() at run time
#        - agent.who                        Reference(Device) for this engine
#        - URL prefix on entity.what.value  server base URL + EHR id from config
#
#   2. SPEC DEFAULTS (constants pinned by this YAML via `manual` literals)
#        - activity.coding                  v3-DataOperation / TRANSFORM
#        - agent.type.coding                provenance-participant-type / assembler
#        - entity[0].role                   "source"
#        - entity[0].what.identifier.system openEHR ObjectLocation NamingSystem
#
#   3. DATA-DRIVEN (mapped from the source composition)
#        - entity[0].what.identifier.value  composition uid/value
#        - entity[0].what.display           composition name/value

mappings:

  # ─── activity ────────────────────────────────────────────────────────────────
  # Fixed: every run is a transform from openEHR to FHIR.
  - name: "activity"
    with:
      fhir: "$resource.activity.coding"
    manual:
      - name: "activityCoding"
        fhir:
          - path: "system"
            value: "http://terminology.hl7.org/CodeSystem/v3-DataOperation"
          - path: "code"
            value: "TRANSFORM"
          - path: "display"
            value: "transform"

  # ─── agent ───────────────────────────────────────────────────────────────────
  # agent.type is a fixed coding identifying the engine as an "assembler".
  # agent.who is runtime-supplied (Reference(Device) for this engine deployment).
  - name: "agent"
    with:
      fhir: "$resource.agent.type.coding[0]"
    manual:
      - name: "agentType"
        fhir:
          - path: "system"
            value: "http://terminology.hl7.org/CodeSystem/provenance-participant-type"
          - path: "code"
            value: "assembler"
          - path: "display"
            value: "Assembler"

  # ─── entity[role=source] ─────────────────────────────────────────────────────
  # The link back to the originating openEHR composition.
  #
  #   entity.role                       fixed literal "source"
  #   entity.what.identifier.system     fixed openEHR NamingSystem (TODO: confirm
  #                                     this is the canonical system URI with the
  #                                     openEHR FHIR profile group)
  #   entity.what.identifier.value      composition uid/value
  #                                     The engine MAY prefix this with the
  #                                     openEHR server base URL + EHR id from
  #                                     deployment config to produce a resolvable
  #                                     URL. The YAML emits the bare uid only.
  #   entity.what.display               composition name/value
  - name: "sourceEntity"
    with:
      fhir: "$resource.entity"
    followedBy:
      mappings:
        - name: "sourceEntityRole"
          with:
            fhir: "role"
          manual:
            - name: "role"
              fhir:
                - path: "$fhirRoot"
                  value: "source"

        - name: "sourceEntityWhat"
          with:
            fhir: "what"
            openehr: "$composition"
          followedBy:
            mappings:
              - name: "sourceEntityIdentifierSystem"
                with:
                  fhir: "identifier.system"
                manual:
                  - name: "system"
                    fhir:
                      - path: "$fhirRoot"
                        value: "http://openehr.org/fhir/NamingSystem/ObjectLocation"

              - name: "sourceEntityIdentifierValue"
                with:
                  fhir: "identifier.value"
                  openehr: "uid/value"

              - name: "sourceEntityDisplay"
                with:
                  fhir: "display"
                  openehr: "name/value"
