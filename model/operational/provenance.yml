grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: provenance
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Provenance


## WIP CHECK THEOS MODEL

# OPERATIONAL MODEL — No openEhrConfig: this resource is not derived from a single
# openEHR archetype but is generated by the FHIRconnect engine as a side-effect of
# every composition-to-FHIR mapping run.
#
# Most fields below are ENGINE GENERATED and do not require user input.
# They are documented here so implementers understand what the engine sets and can
# override individual values via FHIR extensions or post-processing hooks if needed.
#
# The only field that REQUIRES user input is entity[role=source].what, which must
# point to the originating openEHR composition (see the active mapping below).

mappings:

  # ─── ENGINE GENERATED ────────────────────────────────────────────────────────
  #
  # Provenance.target  (1..*)
  #   Engine sets this to a versioned reference for every FHIR resource that was
  #   produced in the mapping run (e.g. Patient, Condition, Observation …).
  #   Uses version-specific references (resource/id/_history/version) so the
  #   provenance record is pinned to an exact version.
  #
  # Provenance.recorded  (0..1, instant)
  #   Engine sets this to the timestamp at which the mapping was executed.
  #
  # Provenance.occurredDateTime  (0..1, dateTime)
  #   Engine sets this to the same timestamp as recorded unless a composition
  #   context time is available, in which case that is preferred.
  #
  # Provenance.activity  (0..1, CodeableConcept)
  #   Engine sets coding:
  #     system:  http://terminology.hl7.org/CodeSystem/v3-DataOperation
  #     code:    TRANSFORM
  #     display: transform
  #
  # Provenance.agent  (1..*)
  #   Engine creates one agent entry representing itself:
  #     agent.type.coding:
  #       system:  http://terminology.hl7.org/CodeSystem/provenance-participant-type
  #       code:    assembler
  #       display: Assembler
  #     agent.who: Reference(Device) — the FHIRconnect engine device resource
  #
  # ─────────────────────────────────────────────────────────────────────────────

  # ─── USER INPUT REQUIRED ─────────────────────────────────────────────────────
  #
  # Provenance.entity[role=source].what  (1..1, Reference(Any))
  #   Must reference the openEHR composition that was the source of the mapping.
  #   Provide either:
  #     a) A resolvable URL to the openEHR REST API endpoint for the composition, or
  #     b) An identifier-based reference with the composition UID.
  #
  #   The engine uses this value as-is; it cannot infer the openEHR server address
  #   automatically. Configure it via the engine's source configuration or supply
  #   the reference at mapping invocation time.
  #
  - name: "sourceEntity"
    with:
      fhir: "$resource.entity"
      openehr: "$composition"
      type: "NONE"
    followedBy:
      mappings:
        - name: "sourceEntityRole"
          with:
            fhir: "role"
          manual:
            - name: "role"
              fhir:
                - path: "role"
                  value: "source"

        # entity.what must be provided by the user / calling system.
        # The value should be the canonical URL or versioned reference to the
        # openEHR composition, e.g.:
        #   https://<ehr-server>/ehr/<ehr-id>/composition/<composition-uid>::<version>
        - name: "sourceEntityWhat"
          with:
            fhir: "what.identifier.value"
            openehr: "uid/value"
